<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philippine News Portal</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
header{background:#0d6efd;color:#fff;text-align:center;padding:20px}
#container{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.card img{width:100%;height:200px;object-fit:cover}
.content{padding:15px}
.btn{display:inline-block;padding:8px 14px;background:#0d6efd;color:#fff;text-decoration:none;border-radius:5px}
</style>
</head>
<body>
<header><h1>🇵🇭 Philippine News Portal</h1><p>Latest Philippine News</p></header>
<div id="container"></div>
<script>
const API_KEY="pub_b0dbdd95ee6448b8865bf8060afb571f";
fetch(`https://newsdata.io/api/1/latest?apikey=${API_KEY}&country=ph&language=en`)
.then(r=>r.json())
.then(data=>{
const c=document.getElementById("container");
data.results.forEach(article=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`
<img src="${article.image_url||'https://via.placeholder.com/400x200?text=No+Image'}">
<div class="content">
<h3>${article.title}</h3>
<p>${article.description||'No description available.'}</p>
<a class="btn" href="${article.link}" target="_blank">Read More</a>
</div>`;
c.appendChild(d);
});
})
.catch(console.error);
</script>
</body>
</html>
